<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบำเหน็จค้ำประกัน</title>
    <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
    }
    iframe { 
      width: 100%; 
      /* เปลี่ยนจาก -28px เป็น -24px หรือ 0 หากแถบ Google ไม่ขึ้นโชว์อยู่แล้ว */
      margin-top: 0px; 
      height: calc(100% + 24px); 
      border: none; 
    }
  </style>
</head>

<body>
    <iframe
        src="https://script.google.com/macros/s/AKfycbw14AYb2sATYnXn7kubIGZOoXdxWfPG5040LZsGpV_tZ5DybAM6ZbyKXlVJoRnaXvpn/exec"></iframe>
</body>

</html>
